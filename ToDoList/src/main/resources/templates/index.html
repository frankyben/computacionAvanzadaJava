<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Spring Boot 6 de Abril</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="container-custom shadow">
    <h2 class="text-center mb-4" th:text="${item.id == null ? 'Agregar Ítem' : 'Actualizar Ítem'}"></h2>
    
    <form th:action="@{/agregar}" th:object="${item}" method="post" class="mb-4">
        <input type="hidden" th:field="*{id}">
        
        <div class="input-group">
            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre del ítem" required>
            <button class="btn" th:classappend="${item.id == null ? 'btn-primary' : 'btn-warning'}" type="submit">
                <i th:class="${item.id == null ? 'bi bi-plus-circle' : 'bi bi-pencil-square'}"></i>
                <span th:text="${item.id == null ? ' Guardar' : ' Actualizar'}"></span>
            </button>
            <a th:if="${item.id != null}" href="/" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

    <div class="item-list">
        <div th:each="i : ${items}" class="item-card d-flex justify-content-between align-items-center">
            <span th:text="${i.nombre}"></span>
            <div class="btn-group">
                <a th:href="@{/editar/{id}(id=${i.id})}" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                </a>
                <a th:href="@{/eliminar/{id}(id=${i.id})}" 
                   class="btn btn-sm btn-outline-danger" 
                   onclick="return confirm('¿Eliminar este registro?')">
                    <i class="bi bi-trash"></i>
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
