<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Practica Spring Boot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container-custom">
    <h2 class="text-center mb-4 text-primary">Por hacer</h2>
    <form th:action="@{/agregar}" th:object="${item}" method="post" class="input-group mb-4">
        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Escribe un nuevo ítem..." required>
        <button class="btn btn-primary" type="submit">Guardar</button>
    </form>
    <hr>
    <div class="item-list">
        <div th:each="i : ${items}" class="item-card shadow-sm">
            <div>
                <span class="fw-bold text-secondary" th:text="'#' + ${i.id}"></span>
                <span class="ms-2" th:text="${i.nombre}"></span>
            </div>
            <span class="badge bg-success rounded-pill">Activo</span>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(items)}" class="text-center text-muted mt-4">
        <p>No hay ítems registrados aún.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
