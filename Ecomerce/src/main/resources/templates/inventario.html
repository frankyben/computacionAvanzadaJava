<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario Ropa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/tienda.css}">
</head>
<body class="p-4 bg-light">
    <div class="container">
        <div class="row mb-4 text-center">
            <div class="col-md-6">
                <div class="card bg-primary text-white p-3 shadow border-0">
                    <h5>Unidades Totales: <span th:text="${totalUnidades}">0</span></h5>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card bg-success text-white p-3 shadow border-0">
                    <h5>Valor Total: <span th:text="${#numbers.formatCurrency(valorTotal)}">$0</span></h5>
                </div>
            </div>
        </div>

        <div class="card p-4 mb-4 shadow border-0">
            <form th:action="@{/ropa/guardar}" th:object="${prenda}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">
                <div class="col-md-3">
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre de prenda" required>
                </div>
                <div class="col-md-3">
                    <select th:field="*{categoria}" class="form-select">
                        <option value="Dama">Dama</option>
                        <option value="Caballero">Caballero</option>
                        <option value="Unisex">Unisex</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="Precio" required>
                </div>
                <div class="col-md-2">
                    <input type="number" th:field="*{cantidad}" class="form-control" placeholder="Stock" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-dark w-100">Guardar</button>
                </div>
            </form>
        </div>

        <div class="table-responsive bg-white rounded shadow">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio Unit.</th>
                        <th>Stock</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${prendas}">
                        <td th:text="${p.nombre}"></td>
                        <td th:text="${p.categoria}"></td>
                        <td th:text="${#numbers.formatCurrency(p.precio)}"></td>
                        <td th:text="${p.cantidad}"></td>
                        <td class="fw-bold" th:text="${#numbers.formatCurrency(p.precio * p.cantidad)}"></td>
                        <td>
                            <a th:href="@{/ropa/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                            <a th:href="@{/ropa/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar prenda?')">Borrar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
